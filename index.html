<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الدودة الكلاسيكية | أرض السعودية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00b359;
            --primary-light: #00e676;
            --bg-gradient: linear-gradient(135deg, #f4f7f5 0%, #e8efe9 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e2925;
            --text-sub: #5c6f68;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* كرت اللعبة الرئيسي */
        .game-container {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(0, 60, 30, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(0, 179, 89, 0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* لوحة النتائج */
        .score-board {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.04);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .score-box span {
            color: var(--primary-color);
            font-size: 16px;
        }

        /* شاشة اللعبة الزجاجية الداكنة */
        canvas {
            background: #1e2925;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.3), 0 4px 15px rgba(0, 179, 89, 0.05);
            max-width: 100%;
            height: auto;
        }

        /* أزرار التحكم اللمسية للجوال (استجابة سريعة جداً) */
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 55px);
            gap: 12px;
            margin-top: 25px;
            max-width: 220px;
            margin-left: auto;
            margin-right: auto;
        }

        .ctrl-btn {
            background: #1e2925;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.1s, transform 0.1s;
        }

        .ctrl-btn:active {
            background: var(--primary-color);
            transform: scale(0.92);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* شاشة الخسارة وزر الإعادة */
        .game-over-overlay {
            display: none;
            margin-top: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-restart {
            background: linear-gradient(135deg, #00cc66 0%, #00994d 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 179, 89, 0.3);
            transition: transform 0.2s;
        }

        .btn-restart:hover {
            transform: scale(1.05);
        }

        /* الحقوق أسفل الموقع */
        .copyright {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 25px;
            font-weight: 500;
        }

        .copyright a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        /* إخفاء أزرار الشاشة تلقائياً عند فتح الموقع من الكمبيوتر */
        @media (min-width: 768px) {
            .touch-controls {
                display: none;
            }
            .subtitle::after {
                content: " (استخدم أسهم لوحة المفاتيح للعب)";
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>لعبة الدودة 🐍</h1>
    <div class="subtitle">العب الآن مجاناً بدون تسجيل</div>

    <div class="score-board">
        <div class="score-box">النقاط: <span id="current-score">0</span></div>
        <div class="score-box">أعلى نتيجة: <span id="high-score">0</span></div>
    </div>

    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <div class="game-over-overlay" id="over-box">
        <p style="color: #ff3d00; font-weight: bold; margin-bottom: 12px; font-size: 15px;">انتهت اللعبة! 😢</p>
        <button class="btn-restart" onclick="resetGame()">العب مجدداً</button>
    </div>

    <div class="touch-controls">
        <button class="ctrl-btn" id="btn-up"><i class="fa-solid fa-chevron-up"></i></button>
        <button class="ctrl-btn" id="btn-left"><i class="fa-solid fa-chevron-right"></i></button>
        <button class="ctrl-btn" id="btn-right"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="ctrl-btn" id="btn-down"><i class="fa-solid fa-chevron-down"></i></button>
    </div>

    <div class="copyright">
        &copy; جميع الحقوق محفوظة لـ <a href="https://saudiearth.com" target="_blank">أرض السعودية</a>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const box = 15; // حجم المربع الواحد
    let snake, direction, food, score, gameInterval;
    
    // جلب أعلى نتيجة محفوظة على جهاز المستخدم سابقاً
    let highScore = localStorage.getItem("snakeHighScoreOnly") || 0;
    document.getElementById("high-score").innerText = highScore;

    function initGame() {
        snake = [{ x: 10 * box, y: 10 * box }];
        direction = "RIGHT";
        score = 0;
        document.getElementById("current-score").innerText = score;
        document.getElementById("over-box").style.display = "none";
        generateFood();
        
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(draw, 120); // ضبط سرعة اللعبة لتكون ممتعة وموزونة
    }

    function generateFood() {
        food = {
            x: Math.floor(Math.random() * (canvas.width / box)) * box,
            y: Math.floor(Math.random() * (canvas.height / box)) * box
        };
        // التحقق من عدم ظهور الأكل تحت جسم الدودة بالخطأ
        for (let cell of snake) {
            if (cell.x === food.x && cell.y === food.y) generateFood();
        }
    }

    // التحكم الاحترافي عبر الكيبورد (يدعم الأسهم وحروف WASD باللغتين)
    document.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        if (e.key === "ArrowUp" || key === "w" || key === "ص") changeDirection("UP");
        if (e.key === "ArrowDown" || key === "s" || key === "س") changeDirection("DOWN");
        if (e.key === "ArrowLeft" || key === "a" || key === "ش") changeDirection("LEFT");
        if (e.key === "ArrowRight" || key === "d" || key === "ي") changeDirection("RIGHT");
    });

    // تشغيل حدث اللمس الفوري السريع للهواتف (iOS & Android) لمنع التأخير والتكبير
    document.getElementById("btn-up").addEventListener("touchstart", (e) => { e.preventDefault(); changeDirection("UP"); });
    document.getElementById("btn-down").addEventListener("touchstart", (e) => { e.preventDefault(); changeDirection("DOWN"); });
    document.getElementById("btn-left").addEventListener("touchstart", (e) => { e.preventDefault(); changeDirection("LEFT"); });
    document.getElementById("btn-right").addEventListener("touchstart", (e) => { e.preventDefault(); changeDirection("RIGHT"); });

    function changeDirection(newDir) {
        if (newDir === "UP" && direction !== "DOWN") direction = "UP";
        if (newDir === "DOWN" && direction !== "UP") direction = "DOWN";
        if (newDir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
        if (newDir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    }

    function checkCollision(head, array) {
        for (let i = 0; i < array.length; i++) {
            if (head.x === array[i].x && head.y === array[i].y) return true;
        }
        return false;
    }

    function draw() {
        // رسم خلفية الحقل
        ctx.fillStyle = "#1e2925";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // رسم الدودة (الرأس بلون مميز والجسم بلون أساسي متناسق)
        for (let i = 0; i < snake.length; i++) {
            ctx.fillStyle = i === 0 ? var(--primary-light) : var(--primary-color);
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
            ctx.strokeStyle = "#1e2925";
            ctx.strokeRect(snake[i].x, snake[i].y, box, box);
        }

        // رسم طعام الدودة (تفاحة دائرية ناعمة)
        ctx.fillStyle = "#ff3d00";
        ctx.beginPath();
        ctx.arc(food.x + box/2, food.y + box/2, box/2 - 1, 0, 2 * Math.PI);
        ctx.fill();

        let snakeX = snake[0].x;
        let snakeY = snake[0].y;

        if (direction === "UP") snakeY -= box;
        if (direction === "DOWN") snakeY += box;
        if (direction === "LEFT") snakeX -= box;
        if (direction === "RIGHT") snakeX += box;

        // منطق التغذية والنمو
        if (snakeX === food.x && snakeY === food.y) {
            score++;
            document.getElementById("current-score").innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScoreOnly", highScore);
                document.getElementById("high-score").innerText = highScore;
            }
            generateFood();
        } else {
            snake.pop();
        }

        const newHead = { x: snakeX, y: snakeY };

        // قوانين الخسارة والاصطدام بالحواف أو النفس
        if (
            snakeX < 0 || snakeY < 0 || 
            snakeX >= canvas.width || snakeY >= canvas.height ||
            checkCollision(newHead, snake)
        ) {
            clearInterval(gameInterval);
            document.getElementById("over-box").style.display = "block";
            return;
        }

        snake.unshift(newHead);
    }

    // لتسهيل جلب الألوان البرمجية من الـ CSS إلى الـ Canvas مباشرة
    function var(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function resetGame() { initGame(); }
    
    // تشغيل اللعبة تلقائياً فور دخول الموقع
    initGame();
</script>
</body>
</html>
