<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك البحث الذكي | أرض السعودية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00b359;
            --bg-gradient: linear-gradient(135deg, #f4f7f5 0%, #e8efe9 100%);
            --card-bg: #ffffff;
            --text-main: #1e2925;
            --text-sub: #5c6f68;
            --search-shadow: 0 4px 12px rgba(0, 60, 30, 0.05);
            --search-shadow-hover: 0 6px 20px rgba(0, 179, 89, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* حاوية البيانات الحية للزائر (تظهر دائماً بشكل خفيف أعلى اليمين) */
        .visitor-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 179, 89, 0.15);
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 11px;
            color: var(--text-sub);
            box-shadow: var(--search-shadow);
            line-height: 1.5;
            text-align: right;
        }
        .visitor-badge i { color: var(--primary-color); margin-left: 5px; }

        /* حاوية البحث الرئيسية */
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 580px;
            margin-top: auto;
            margin-bottom: auto;
            text-align: center;
        }

        .brand-logo {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-logo i { color: var(--primary-color); animation: float 3s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .search-box-wrapper {
            width: 100%;
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(0, 179, 89, 0.25);
            border-radius: 30px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            box-shadow: var(--search-shadow);
            transition: all 0.3s ease;
        }
        .search-box-wrapper:focus-within, .search-box-wrapper:hover {
            border-color: var(--primary-color);
            box-shadow: var(--search-shadow-hover);
        }

        .search-icon { color: var(--text-sub); font-size: 18px; margin-left: 12px; }
        .search-input { flex: 1; border: none; outline: none; background: transparent; font-size: 16px; color: var(--text-main); font-family: inherit; }

        .buttons-group { margin-top: 25px; display: flex; gap: 12px; }
        .btn-search {
            background: var(--card-bg); color: var(--text-main); border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 10px 24px; font-size: 14px; font-weight: 600; border-radius: 20px; cursor: pointer;
            transition: all 0.2s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .btn-search:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); transform: translateY(-1px); }

        .search-hints { margin-top: 20px; font-size: 12px; color: var(--text-sub); }
        .search-hints span { color: var(--primary-color); cursor: pointer; margin-right: 5px; font-weight: 600; }
        .search-hints span:hover { text-decoration: underline; }

        /* ترحيب ونافذة الزائر لأول مرة (النافذة المنبثقة) */
        .welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 41, 37, 0.4); backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); display: none; justify-content: center;
            align-items: center; z-index: 9999; animation: fadeIn 0.3s ease;
        }
        
        .welcome-modal {
            background: #ffffff; padding: 30px; border-radius: 25px;
            width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 1px solid rgba(0, 179, 89, 0.2);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .welcome-modal i.main-icon { font-size: 50px; color: var(--primary-color); margin-bottom: 15px; }
        .welcome-modal h2 { font-size: 20px; margin-bottom: 10px; color: var(--text-main); }
        .welcome-modal p { font-size: 13px; color: var(--text-sub); line-height: 1.6; margin-bottom: 20px; }
        
        /* جدول بيانات الزائر داخل نافذة الترحيب */
        .visitor-info-box {
            background: #f4f7f5; border-radius: 15px; padding: 15px;
            margin-bottom: 20px; text-align: right; font-size: 12px;
            border: 1px dashed rgba(0, 179, 89, 0.3);
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: var(--text-sub); font-weight: 500; }
        .info-value { color: var(--text-main); font-weight: bold; }

        .btn-close-modal {
            background: var(--primary-color); color: white; border: none;
            padding: 10px 30px; font-size: 14px; font-weight: bold;
            border-radius: 20px; cursor: pointer; width: 100%;
            box-shadow: 0 4px 12px rgba(0, 179, 89, 0.3);
        }

        footer { font-size: 12px; color: var(--text-sub); width: 100%; text-align: center; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.03); }
        footer a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="visitor-badge" id="live-badge">
    <div><i class="fa-solid fa-desktop"></i> <span id="badge-os">جاري التحليل...</span></div>
    <div><i class="fa-solid fa-clock"></i> <span id="badge-time">00:00</span></div>
</div>
