<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الدودة الاحترافية | ارض السعودية</title>
    <!-- تضمين مكتبة أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00b359;
            --bg-gradient: linear-gradient(135deg, #f4f7f5 0%, #e8efe9 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e2925;
            --text-sub: #5c6f68;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 60, 30, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* لوحة النتائج */
        .score-board {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.04);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
        }

        .score-box span {
            color: var(--primary-color);
        }

        /* منطقة اللعب (Canvas) */
        canvas {
            background: #25332e;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
            max-width: 100%;
            height: auto;
        }

        /* أزرار التحكم اللمسية للجوال */
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            margin-top: 20px;
            max-width: 220px;
            margin-left: auto;
            margin-right: auto;
        }

        .ctrl-btn {
            background: #1e2925;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
        }

        .ctrl-btn:active {
            background: var(--primary-color);
            transform: scale(0.95);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* زر إعادة التشغيل عند الخسارة */
        .game-over-overlay {
            margin-top: 15px;
            display: none;
        }

        .btn-restart {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 179, 89, 0.3);
        }

        .btn-restart:hover {
            transform: scale(1.05);
        }

        .copyright {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 20px;
        }
        .copyright a {
            color: var(--primary-color);
            text-decoration: none;
        }

        /* إخفاء أزرار التحكم على الشاشات الكبيرة (الكمبيوتر) */
        @media (min-width: 768px) {
            .touch-controls {
                display: none;
            }
            .subtitle::after {
                content: " (استخدم أسهم لوحة المفاتيح للعب)";
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>لعبة الدودة 🐍</h1>
    <div class="subtitle">العب الآن مجاناً بدون تسجيل</div>

    <div class="score-board">
        <div class="score-box">السكور الحالي: <span id="current-score">0</span></div>
        <div class="score-box">أعلى سكور: <span id="high-score">0</span></div>
    </div>

    <!-- لوحة الرسم للعبة -->
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <!-- شاشة الخسارة -->
    <div class="game-over-overlay" id="over-box">
        <p style="color: #ff3d00; font-weight: bold; margin-bottom: 10px;">لعبة انتهت! 😢</p>
        <button class="btn-restart" onclick="resetGame()">العب مجدداً</button>
    </div>

    <!-- أزرار الجوال -->
    <div class="touch-controls">
        <button class="ctrl-btn" id="btn-up" onclick="changeDirection('UP')"><i class="fa-solid fa-chevron-up"></i></button>
        <button class="ctrl-btn" id="btn-left" onclick="changeDirection('LEFT')"><i class="fa-solid fa-chevron-right"></i></button>
        <button class="ctrl-btn" id="btn-right" onclick="changeDirection('RIGHT')"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="ctrl-btn" id="btn-down" onclick="changeDirection('DOWN')"><i class="fa-solid fa-chevron-down"></i></button>
    </div>

    <div class="copyright">
        &copy; <a href="https://saudiearth.com" target="_blank">أرض السعودية</a>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const box = 15; // حجم المربع الواحد داخل اللعبة
    let snake, direction, food, score, gameInterval;
    
    // جلب أعلى سكور محفوظ في جهاز المستخدم
    let highScore = localStorage.getItem("snakeHighScore") || 0;
    document.getElementById("high-score").innerText = highScore;

    function initGame() {
        snake = [{ x: 10 * box, y: 10 * box }];
        direction = "RIGHT";
        score = 0;
        document.getElementById("current-score").innerText = score;
        document.getElementById("over-box").style.display = "none";
        generateFood();
        
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(draw, 130); // سرعة اللعبة (كلما قل الرقم زادت السرعة)
    }

    function generateFood() {
        food = {
            x: Math.floor(Math.random() * (canvas.width / box)) * box,
            y: Math.floor(Math.random() * (canvas.height / box)) * box
        };
        // التأكد أن الأكل لم يظهر فوق جسم الدودة
        for (let cell of snake) {
            if (cell.x === food.x && cell.y === food.y) generateFood();
        }
    }

    // التحكم من الكيبورد للكمبيوتر
    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp" || e.key === "w") changeDirection("UP");
        if (e.key === "ArrowDown" || e.key === "s") changeDirection("DOWN");
        if (e.key === "ArrowLeft" || e.key === "a") changeDirection("LEFT");
        if (e.key === "ArrowRight" || e.key === "d") changeDirection("RIGHT");
    });

    function changeDirection(newDir) {
        if (newDir === "UP" && direction !== "DOWN") direction = "UP";
        if (newDir === "DOWN" && direction !== "UP") direction = "DOWN";
        if (newDir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
        if (newDir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    }

    function checkCollision(head, array) {
        for (let i = 0; i < array.length; i++) {
            if (head.x === array[i].x && head.y === array[i].y) return true;
        }
        return false;
    }

    function draw() {
        // تنظيف الشاشة ورسم الخلفية
        ctx.fillStyle = "#25332e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // رسم الدودة
        for (let i = 0; i < snake.length; i++) {
            ctx.fillStyle = i === 0 ? "#00e676" : "#00b359"; // رأس الدودة أفتح من جسمها
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
            ctx.strokeStyle = "#25332e";
            ctx.strokeRect(snake[i].x, snake[i].y, box, box);
        }

        // رسم الأكل (التفاحة)
        ctx.fillStyle = "#ff3d00";
        ctx.beginPath();
        ctx.arc(food.x + box/2, food.y + box/2, box/2 - 1, 0, 2 * Math.PI);
        ctx.fill();

        // تحديد مكان الرأس القادم
        let snakeX = snake[0].x;
        let snakeY = snake[0].y;

        if (direction === "UP") snakeY -= box;
        if (direction === "DOWN") snakeY += box;
        if (direction === "LEFT") snakeX -= box;
        if (direction === "RIGHT") snakeX += box;

        // إذا أكلت الدودة التفاحة
        if (snakeX === food.x && snakeY === food.y) {
            score++;
            document.getElementById("current-score").innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                document.getElementById("high-score").innerText = highScore;
            }
            generateFood();
        } else {
            snake.pop(); // حذف الذيل للحفاظ على الطول إذا لم تأكل
        }

        const newHead = { x: snakeX, y: snakeY };

        // قوانين الخسارة (الاصطدام بالحائط أو بالجسم)
        if (
            snakeX < 0 || snakeY < 0 || 
            snakeX >= canvas.width || snakeY >= canvas.height ||
            checkCollision(newHead, snake)
        ) {
            clearInterval(gameInterval);
            document.getElementById("over-box").style.display = "block";
            return;
        }

        snake.unshift(newHead);
    }

    function resetGame() {
        initGame();
    }

    // تشغيل اللعبة تلقائياً عند تحميل الصفحة
    initGame();
</script>

</body>
</html>
