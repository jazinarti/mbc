<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك البحث الذكي | أرض السعودية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00b359;
            --bg-gradient: linear-gradient(135deg, #f4f7f5 0%, #e8efe9 100%);
            --card-bg: #ffffff;
            --text-main: #1e2925;
            --text-sub: #5c6f68;
            --search-shadow: 0 4px 12px rgba(0, 60, 30, 0.05);
            --search-shadow-hover: 0 6px 20px rgba(0, 179, 89, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* شارة بيانات الزائر أعلى اليمين */
        .visitor-badge {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid rgba(0, 179, 89, 0.15);
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 11px;
            color: var(--text-sub);
            box-shadow: var(--search-shadow);
            margin-bottom: 30px;
        }
        .visitor-badge i { color: var(--primary-color); margin-left: 5px; }

        /* حاوية البحث */
        .search-container {
            width: 100%;
            max-width: 680px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.5s ease;
        }

        /* تصغير حجم الهيدر تلقائياً عند ظهور نتائج */
        .search-container.has-results {
            margin-top: 10px;
        }

        .brand-logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .brand-logo i { color: var(--primary-color); }

        .search-box-wrapper {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(0, 179, 89, 0.25);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            box-shadow: var(--search-shadow);
        }
        .search-box-wrapper:focus-within {
            border-color: var(--primary-color);
            box-shadow: var(--search-shadow-hover);
        }

        .search-input { flex: 1; border: none; outline: none; background: transparent; font-size: 16px; color: var(--text-main); font-family: inherit; }
        .btn-search-trigger { background: none; border: none; color: var(--primary-color); font-size: 18px; cursor: pointer; padding-right: 10px; }

        /* منطقة عرض النتائج الفورية في نفس الصفحة */
        .results-container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--search-shadow);
            border: 1px solid rgba(0, 0, 0, 0.02);
            text-decoration: none; /* لإزالة الخط السفلي للرابط */
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-align: right;
            animation: slideUp 0.4s ease;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 179, 89, 0.1);
            border-color: rgba(0, 179, 89, 0.2);
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .result-snippet {
            font-size: 13.5px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .result-link-preview {
            font-size: 11px;
            color: #8da299;
            margin-top: 10px;
            display: block;
        }

        .status-msg { font-size: 14px; color: var(--text-sub); text-align: center; padding: 20px; }

        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        footer { font-size: 12px; color: var(--text-sub); width: 100%; text-align: center; padding: 20px 0; margin-top: auto; border-top: 1px solid rgba(0,0,0,0.03); }
        footer a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="visitor-badge" id="live-badge">
    <i class="fa-solid fa-desktop"></i> <span id="badge-os">جاري التحليل...</span>
    <span style="margin: 0 8px; opacity: 0.3;">|</span>
    <i class="fa-solid fa-clock"></i> <span id="badge-time">00:00</span>
</div>

<div class="search-container" id="searchContainer">
    <div class="brand-logo">
        <i class="fa-solid fa-magnifying-glass-chart"></i>
        <span>البحث الفوري</span>
    </div>

    <div class="search-box-wrapper">
        <input type="text" id="query-input" class="search-input" placeholder="اكتب موضوعاً (مثال: السعودية) واضغط Enter..." autocomplete="off" onkeydown="checkEnter(event)">
        <button class="btn-search-trigger" onclick="executeSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
</div>

<div class="results-container" id="resultsContainer"></div>

<footer>
    &copy; جميع الحقوق محفوظة لـ <a href="https://saudiearth.com" target="_blank">أرض السعودية</a>
</footer>

<script>
    // 1. تشغيل بيانات الجلسة للزائر
    window.addEventListener('DOMContentLoaded', () => {
        const userAgent = navigator.userAgent;
        let os = "جهاز ذكي";
        if (userAgent.indexOf("Win") !== -1) os = "Windows";
        if (userAgent.indexOf("Mac") !== -1) os = "Mac / iOS";
        if (userAgent.indexOf("Linux") !== -1) os = "Android / Linux";
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
        
        document.getElementById("badge-os").innerText = os;
        document.getElementById("badge-time").innerText = timeStr;
    });

    // 2. دالة جلب وعرض البيانات الفورية في نفس الصفحة
    async function executeSearch() {
        const inputElement = document.getElementById("query-input");
        const query = inputElement.value.trim();
        const resultsContainer = document.getElementById("resultsContainer");
        const searchContainer = document.getElementById("searchContainer");

        if (query === "") {
            alert("الرجاء كتابة شيء للبحث عنه!");
            return;
        }

        // إظهار نص جاري التحميل
        resultsContainer.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> جاري جلب النتائج الفورية وعرضها...</div>';
        searchContainer.classList.add('has-results');

        // الاتصال بمحرك البحث لجلب نتائج باللغة العربية
        const url = `https://ar.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            const searchResults = data.query.search;

            if (searchResults.length === 0) {
                resultsContainer.innerHTML = '<div class="status-msg">❌ عذراً، لم نجد نتائج فورية لهذه الكلمة. جرب كلمة أخرى.</div>';
                return;
            }

            // تنظيف الحاوية والبدء في بناء الكروت للنتائج
            resultsContainer.innerHTML = "";

            searchResults.forEach(item => {
                const card = document.createElement("a");
                card.className = "result-card";
                
                // الرابط المباشر الذي سيفتح عند الضغط على الكرت في صفحة جديدة
                card.href = `https://ar.wikipedia.org/?curid=${item.pageid}`;
                card.target = "_blank"; // الكود السحري لفتح صفحة جديدة

                // إزالة وسوم الـ HTML الافتراضية من الوصف
                const cleanSnippet = item.snippet.replace(/<\/?[^>]+(>|$)/g, "");

                card.innerHTML = `
                    <div class="result-title">${item.title}</div>
                    <div class="result-snippet">${cleanSnippet}...</div>
                    <span class="result-link-preview">اضغط لفتح المقال الكامل في نافذة جديدة ↗</span>
                `;
                
                resultsContainer.appendChild(card);
            });

        } catch (error) {
            resultsContainer.innerHTML = '<div class="status-msg" style="color: red;">⚠️ فشل الاتصال بخادم النتائج السريعة.</div>';
        }
    }

    function checkEnter(event) {
        if (event.key === "Enter") {
            executeSearch();
        }
    }
</script>

</body>
</html>
